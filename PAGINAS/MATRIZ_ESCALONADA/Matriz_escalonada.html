<style id="mk-design-v2">
:root{
  --blue-deep:#1a2b6b;
  --blue-mid:#2d4faa;
  --blue-bright:#3b6ef8;
  --blue-light:#e8eeff;
  --blue-glow:rgba(59,110,248,.18);
  --text-primary:#0f1629;
  --text-secondary:#4a5270;
  --text-muted:#7b839e;
  --bg-page:#f4f6fd;
  --bg-card:#ffffff;
  --border-card:rgba(30,50,150,.08);
  --radius-card:20px;
  --shadow-card:0 4px 24px rgba(20,40,120,.07),0 1px 4px rgba(20,40,120,.04);
  --shadow-btn:0 8px 28px rgba(43,79,170,.28);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
}

*{box-sizing:border-box}

body{
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.68;
  color:var(--text-primary);
  background:var(--bg-page);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,110,248,.09) 0%,transparent 70%);
  min-height:100vh;
  margin:0;
}

/* ── WRAP ── */
.introWrap{
  max-width:1100px;
  margin:0 auto;
  padding:28px 24px 56px;
}

/* ── HERO ── */
.hero{
  position:relative;
  background:linear-gradient(135deg,var(--blue-deep) 0%,var(--blue-mid) 60%,#3355c8 100%);
  border-radius:28px;
  padding:36px 40px 32px;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(20,40,130,.28),0 4px 12px rgba(20,40,130,.18);
  margin-bottom:32px;
}

/* decorative circles */
.hero::before,.hero::after{
  content:'';position:absolute;border-radius:50%;
  background:rgba(255,255,255,.06);pointer-events:none;
}
.hero::before{width:340px;height:340px;top:-120px;right:-80px}
.hero::after{width:200px;height:200px;bottom:-80px;left:30px}

.heroTop{
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  position:relative;
  z-index:1;
}

.heroTop h1{
  font-family:var(--font-display);
  font-size:clamp(1.9rem,4vw,2.8rem);
  font-weight:400;
  letter-spacing:-.02em;
  color:#fff;
  margin:0;
  flex:1;
  text-shadow:0 2px 12px rgba(0,0,0,.18);
}

.heroBadge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.9);
  border-radius:999px;
  font-size:.78rem;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:5px 14px;
  backdrop-filter:blur(8px);
  margin-bottom:10px;
  width:fit-content;
}

.heroDesc{
  position:relative;
  z-index:1;
  margin-top:14px;
  color:rgba(255,255,255,.85);
  font-size:1.02rem;
  line-height:1.7;
  max-width:700px;
}

.heroDesc ol{
  margin:10px 0 0 20px;
  padding:0;
  color:rgba(255,255,255,.82);
}
.heroDesc ol li{margin:6px 0}

.heroLinks{
  position:relative;
  z-index:1;
  margin-top:24px;
  display:grid;
  grid-template-columns:repeat(4,max-content);
  gap:10px;
}

.heroLinkBtn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 20px;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);
  color:#fff;
  text-decoration:none;
  font-size:.88rem;
  font-weight:600;
  letter-spacing:.01em;
  backdrop-filter:blur(6px);
  transition:background .18s,transform .15s,box-shadow .18s;
}
.heroLinkBtn:hover{
  background:rgba(255,255,255,.24);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(0,0,0,.18);
}
.heroLinkBtn svg{opacity:.7;flex-shrink:0}

.heroOps{
  position:relative;
  z-index:1;
  margin-top:24px;
  padding:18px 20px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  backdrop-filter:blur(4px);
}
.heroOps p{
  color:rgba(255,255,255,.7);
  font-size:.9rem;
  margin:0 0 12px;
}
.heroOps ul{
  list-style:none;
  margin:0;padding:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 20px;
}
.heroOps ul li{
  display:flex;align-items:baseline;gap:8px;
  color:rgba(255,255,255,.88);
  font-size:.9rem;
  line-height:1.5;
}
.heroOps ul li::before{
  content:'→';
  color:var(--blue-bright);
  font-weight:700;
  flex-shrink:0;
  opacity:.85;
}

/* ── BUTTONS ── */
.volverBtn{
  display:inline-flex!important;
  align-items:center;
  gap:6px;
  padding:10px 20px!important;
  border-radius:999px!important;
  background:rgba(255,255,255,.18)!important;
  border:1px solid rgba(255,255,255,.3)!important;
  color:#fff!important;
  text-decoration:none!important;
  font-weight:700!important;
  font-size:.88rem;
  letter-spacing:.03em;
  backdrop-filter:blur(8px);
  transition:background .18s,transform .15s;
}
.volverBtn:hover{background:rgba(255,255,255,.28)!important;transform:translateY(-1px)}

.trabajoBtn{
  display:inline-flex!important;
  align-items:center;
  padding:11px 24px!important;
  border-radius:999px!important;
  background:#fff!important;
  border:none!important;
  color:var(--blue-deep)!important;
  text-decoration:none!important;
  font-weight:800!important;
  font-size:.88rem;
  letter-spacing:.02em;
  box-shadow:var(--shadow-btn)!important;
  transition:transform .15s,box-shadow .18s;
}
.trabajoBtn:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(43,79,170,.36)!important}
.heroTopBar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;position:relative;z-index:1}
.logoMini{display:block;flex-shrink:0}


/* ── CARDS ── */
.card{
  background:var(--bg-card)!important;
  border:1px solid var(--border-card)!important;
  border-radius:var(--radius-card)!important;
  box-shadow:var(--shadow-card)!important;
  padding:26px 28px!important;
  margin-bottom:16px;
  transition:box-shadow .2s,transform .2s;
}
.card:hover{
  box-shadow:0 8px 36px rgba(20,40,120,.11),0 2px 6px rgba(20,40,120,.05)!important;
  transform:translateY(-1px);
}
.card h2{
  font-family:var(--font-display);
  font-size:1.3rem!important;
  font-weight:400!important;
  color:var(--blue-deep);
  margin:0 0 14px!important;
  letter-spacing:-.01em;
}

.card ul{margin:0;padding-left:20px}
.card ul li{
  margin:8px 0;
  color:var(--text-secondary);
  line-height:1.6;
}
.card ul li strong{color:var(--text-primary)}

/* ── MATH BLOCKS ── */
.k{
  background:linear-gradient(135deg,var(--blue-light) 0%,#f0f4ff 100%)!important;
  border:1px solid rgba(59,110,248,.14)!important;
  border-radius:14px!important;
  padding:18px 20px!important;
  overflow-x:auto;
  margin:12px 0;
}

/* ── STEP LABELS ── */
.stepLabel{
  display:inline-block;
  background:var(--blue-bright);
  color:#fff;
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  padding:3px 10px;
  border-radius:999px;
  margin-bottom:6px;
}

.muted{
  color:var(--text-muted)!important;
  font-size:.94rem;
  line-height:1.65;
  margin:10px 0 0!important;
}

/* ── MISC ── */
.accentCard{
  background:linear-gradient(135deg,var(--blue-light),#edf0ff)!important;
  border:1px solid rgba(59,110,248,.15)!important;
  border-radius:var(--radius-card)!important;
  padding:26px 28px!important;
  margin-bottom:16px;
}
.accentCard h2{
  font-family:var(--font-display);
  font-size:1.3rem!important;
  font-weight:400!important;
  color:var(--blue-deep);
  margin:0 0 12px!important;
}

@media(max-width:800px){
  .hero{padding:28px 24px 26px}
  .heroOps ul{grid-template-columns:1fr}
  .introWrap{padding:16px 16px 40px}
  .heroTop{flex-direction:column;align-items:flex-start}
  .trabajoBtn{align-self:flex-start}
  .heroLinks{grid-template-columns:repeat(2,max-content)}
  .herramienta-cta{flex-direction:column}
}
.herramienta-cta{background:linear-gradient(135deg,var(--blue-deep),var(--blue-mid));border-radius:20px;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:4px;flex-wrap:wrap}
.herramienta-cta p{margin:0;color:rgba(255,255,255,.85);font-size:1rem;line-height:1.6;max-width:600px}
.herramienta-cta p strong{color:#fff}

/* MK-RESPONSIVE-PATCH-V1 */
html,body{overflow-x:clip;max-width:100%}
.resultadoRango,.resultadoDet,.resultado{flex-wrap:wrap;max-width:100%;overflow-x:auto}
.resultadoRango>span,.resultadoDet>span,.resultado>span{max-width:100%;overflow-x:auto}
.k{max-width:100%;overflow-x:auto}
@media (max-width:600px){
  .heroTopBar{flex-wrap:wrap;gap:10px}
  .heroTopBar>div{flex-wrap:wrap;gap:10px;justify-content:flex-start}
  .trabajoBtn{font-size:.78rem!important;padding:9px 16px!important;white-space:nowrap}
  .volverBtn{font-size:.82rem;padding:8px 16px!important}
  .logoMini{width:120px;height:auto}
  .heroLinks{grid-template-columns:1fr!important}
  .hero{padding:22px 18px 22px!important}
  .introWrap{padding:14px 12px 32px!important}
}

</style>
