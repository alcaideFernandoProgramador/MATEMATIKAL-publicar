#caja11111{display:flex;justify-content:center;align-items:center;text-align:center;font-size:14px;font-weight:800;letter-spacing:.6px;opacity:.95}
#caja11112{margin-top:8px;font-size:11px;font-weight:700;color:#dbeafe;line-height:1.25;min-height:22px}
#caja1112{flex:0 0 calc(69.5% - var(--gap)/2);background:var(--soft);border:1px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;padding:8px;flex-wrap:wrap}

#caja2borde{background:transparent;flex:1;min-height:220px}
#caja2{height:100%;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px}
#caja2 h4{font-size:12px;font-weight:900;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin:6px 0 4px}
#caja21{min-height:160px;border:1px solid var(--border);border-radius:var(--radius-sm);background:linear-gradient(180deg,#fff,var(--soft));margin:4px 0 10px;padding:10px;display:flex;flex-direction:row;flex-wrap:wrap;align-items:flex-start;align-content:flex-start;gap:10px;overflow:auto}
/* Buttons */
#contenedor button{appearance:none;border:1px solid var(--border);background:var(--soft);padding:7px 10px;border-radius:999px;font-weight:800;font-size:12px;cursor:pointer;transition:.12s;color:var(--ink)}
#contenedor button:hover{transform:translateY(-1px);background:#e9eef9;border-color:#c7d2fe}
#btnSeleccionar{background:var(--soft)!important}
#btnAuto{background:linear-gradient(90deg,var(--accent),var(--accent-2))!important;color:#fff!important;border-color:transparent!important}
#btnAuto:hover{filter:brightness(1.06)!important}
/* Matrix input */
#contenedor input[type="text"]{font-family:inherit;font-size:13px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--ink);padding:4px 7px;outline:none;width:50px;text-align:center;transition:.12s}
#contenedor input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
#contenedor table{border-collapse:separate;border-spacing:5px;font-size:13px}
/* Options panel */
#cajaOpcTitulo{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.adjCell{cursor:pointer;padding:3px 7px;border-radius:4px;font-size:12px;font-weight:700;border:1.5px solid var(--accent);color:var(--accent);background:#fff;transition:.12s;line-height:1.4}
.adjCell:hover{background:var(--soft);transform:translateY(-1px)}
.adjCell.active{border-color:var(--accent-2);color:var(--accent-2);background:#f0fff4}
.adjCellDone{display:inline-block;padding:3px 7px;border-radius:4px;font-size:12px;font-weight:700;border:1.5px solid #16a34a;color:#16a34a;background:#f0fdf4}
#cajaOpcLista{display:flex;flex-direction:column;gap:2px;flex:1}
#cajaOpcLista label{display:flex;align-items:center;gap:6px;padding:5px 4px;font-size:13px;color:var(--ink);cursor:pointer;border-radius:var(--radius-sm);transition:.1s}
#cajaOpcLista label:hover{background:rgba(37,99,235,.06)}
#cajaOpcLista input[type="radio"]{accent-color:var(--accent)}
#zonaParams{padding:6px 0;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:6px}
.adjParamRow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.adjParamRow label{font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;color:var(--ink)}
.adjNumInput{width:48px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-weight:700;color:var(--ink);outline:none;text-align:center;font-size:13px}
.adjNumInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
#errMsg{font-size:11px;font-weight:800;color:#b91c1c;min-height:16px;padding:2px 0}
#cajaOpcBtns{display:flex;gap:6px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--border);margin-top:6px}
/* Result cards */
.adjResultCard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;align-self:flex-start}
.adjResultCardTitle{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.adjResultCardBody{font-size:13px;color:var(--ink);display:flex;flex-direction:column;gap:4px}
.adjSubline{font-size:12px;color:var(--muted)}
.adjFinalVal{font-weight:700}
.adjVal{color:var(--accent)}
.adjBadgeOk{background:#dcfce7;color:#16a34a;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:800;margin-left:4px}
.adjBadgeSingular{background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 6px;font-size:11px;font-weight:800;margin-left:4px}
.resultBloque{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;align-self:flex-start}
.resultado-final{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid #bfdbfe;border-radius:var(--radius-sm);padding:10px;width:100%}
.resultado-final strong{display:block;color:var(--accent);font-size:11px;font-weight:900;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.singular-aviso{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);padding:8px;color:#b91c1c;font-weight:700;font-size:12px;width:100%}
/* Matriz display */
#matrizDisplay{font-size:13px;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px}
#matrizDisplay table{border-collapse:separate;border-spacing:4px}
#matrizDisplay td{min-width:32px;text-align:center;font-size:13px;color:var(--ink);font-weight:600;padding:2px 4px}
/* Botones de orden */
.btnN{border-radius:999px!important;border:1.5px solid var(--accent)!important;color:var(--accent)!important;background:#fff!important;font-weight:700!important;padding:5px 14px!important;font-size:12px!important}
.btnN:hover,.btnN.active{background:var(--accent)!important;color:#fff!important}
/* Paréntesis curvos de la matriz */
.matrixWrap{display:inline-flex;align-items:stretch;gap:3px;vertical-align:middle}
.mp{display:block;width:10px;flex-shrink:0;border:2.5px solid var(--ink)}
.mp.lp{border-right:none;border-radius:60% 0 0 60%}
.mp.rp{border-left:none;border-radius:0 60% 60% 0}
/* Barras verticales para determinante */
.detWrap{display:inline-flex;align-items:stretch;gap:4px;vertical-align:middle}
.det-bar{display:block;width:0;border-left:2px solid var(--ink);flex-shrink:0}
@media(max-width:1100px){#caja111{flex-direction:column}#caja1111,#caja1112{flex:none!important;width:100%!important}}
@media(max-width:700px){#caja112{flex-direction:column}}
</style>

<script>
(function(){
// ── Fracciones y matrices (vía Biblioteca Matematikal 2.0) ───────────────
function fnum(x){
  x=String(x||"").trim().replace(/\s+/g,"").replace(/,/g,".");
  if(!x.length)return "0";
  if(/^[-+]?\d+$/.test(x))return x;
  if(/^[-+]?\d+\/\d+$/.test(x))return FraccionNumerica.simplificar(x);
  if(/^[-+]?(\d+\.\d*|\.\d+)$/.test(x))return ExpresionAlgebraica.pasarAFraccion(x);
  return null;
}

// ── Estado ───────────────────────────────────────────────────────────────
var currentN=3;
var matrizActual=null;
var detValue=null;
var adjCalculados={};

document.addEventListener('DOMContentLoaded',function(){
  // Botones de orden (2×2 … 5×5)
  document.querySelectorAll('.btnN').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.btnN').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      currentN=parseInt(b.dataset.n);
      mostrarMatrizEntrada(currentN);
    });
  });

  document.getElementById('btnResetear').addEventListener('click',irFaseOrden);
  document.getElementById('btnSeleccionar').addEventListener('click',ejecutarOpcion);
  document.getElementById('btnAuto').addEventListener('click',solucionAutomatica);
  document.getElementById('otraMatrizBtn').addEventListener('click',function(e){
    e.preventDefault();
    irFaseOrden();
  });

  var btnAyuda=document.getElementById('abreVentana1');
  var cerrarAyuda=document.getElementById('cierraVentana1');
  var ventanaAyuda=document.getElementById('ventana1');
  var pdfAyuda=document.getElementById('pdf1');
  var pdfAyudaUrl='INSTRUCCIONES/Ayuda.pdf#view=FitH&navpanes=0&zoom=300';
  if(btnAyuda)btnAyuda.addEventListener('click',function(e){
    e.preventDefault();
    if(pdfAyuda)pdfAyuda.src=pdfAyudaUrl;
    if(ventanaAyuda)ventanaAyuda.style.display='flex';
  });
  if(cerrarAyuda)cerrarAyuda.addEventListener('click',function(){
    if(ventanaAyuda)ventanaAyuda.style.display='none';
    if(pdfAyuda)pdfAyuda.src='';
  });
  window.addEventListener('click',function(e){
    if(e.target===ventanaAyuda){
      ventanaAyuda.style.display='none';
      if(pdfAyuda)pdfAyuda.src='';
    }
  });

  document.querySelectorAll('input[name="adjOpc"]').forEach(function(r){
    r.addEventListener('change',function(){actualizarParams(parseInt(this.value));});
  });

});

// ── Fases de la interfaz ─────────────────────────────────────────────────
function irFaseOrden(){
  matrizActual=null;detValue=null;adjCalculados={};
  document.getElementById('caja111').style.display='';
  document.getElementById('caja11112').textContent='Elige el orden de la matriz';
  document.getElementById('zonaOrden').style.display='';
  document.getElementById('zonaMatriz').style.display='none';
  document.getElementById('caja112').style.display='none';
  document.getElementById('caja2borde').style.display='none';
  document.getElementById('caja21').innerHTML='';
  document.getElementById('matrizDisplay').innerHTML='';
  document.getElementById('zonaParams').innerHTML='';
  document.getElementById('errMsg').textContent='';
  document.getElementById('cajaOpcTitulo').textContent='PASOS';
  document.getElementById('cajaOpcLista').style.display='flex';
  document.getElementById('cajaOpcBtns').style.display='flex';
  ['pasoRow1','pasoRow2','pasoRow3','pasoRow4'].forEach(function(id){
    var row=document.getElementById(id);
    if(row)row.style.display='';
  });
  document.querySelectorAll('input[name="adjOpc"]').forEach(function(r){r.checked=false;});
  document.querySelectorAll('.btnN').forEach(function(b){b.classList.remove('active');});
}

function mostrarMatrizEntrada(n){
  currentN=n;
  document.getElementById('caja11112').textContent='Matriz '+n+'×'+n+' — Introduce los valores';
  document.getElementById('zonaOrden').style.display='none';
  document.getElementById('zonaMatriz').style.display='';
  document.getElementById('caja112').style.display='none';
  document.getElementById('caja2borde').style.display='none';
  document.getElementById('errMsg').textContent='';
  renderMatriz(n);
  // Foco en primera celda
  var first=document.getElementById('m0_0');
  if(first)setTimeout(function(){first.focus();},50);
}

function renderMatriz(n){
  var zona=document.getElementById('zonaMatriz');
  // Tabla de inputs con paréntesis CSS
  var tbl='<table style="border-collapse:separate;border-spacing:5px"><tbody>';
  for(var i=0;i<n;i++){
    tbl+='<tr>';
    for(var j=0;j<n;j++){
      tbl+='<td><input type="text" id="m'+i+'_'+j+'" placeholder="" autocomplete="off" style="width:46px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-weight:700;text-align:center;background:#fff;outline:none;font-size:13px;color:var(--ink)"/></td>';
    }
    tbl+='</tr>';
  }
  tbl+='</tbody></table>';
  zona.innerHTML='<div class="matrixWrap"><div class="mp lp"></div>'+tbl+'<div class="mp rp"></div></div>';
  var inputs=zona.querySelectorAll('input');
  inputs.forEach(function(inp,idx){
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key==='Tab'){
        if(e.key==='Tab')return; // Tab nativo ya avanza
        e.preventDefault();
        if(idx<inputs.length-1){inputs[idx+1].focus();}
        else{confirmarMatriz();}
      }
    });
    inp.addEventListener('blur',function(){
      // Al salir de la última celda (Tab desde la última) confirmar
      if(idx===inputs.length-1){confirmarMatriz();}
    });
    inp.addEventListener('focus',function(){this.select();});
  });
}

function leerMatriz(){
  var n=currentN,M=[];
  for(var i=0;i<n;i++){
    M.push([]);
    for(var j=0;j<n;j++){
      var el=document.getElementById('m'+i+'_'+j);
      var v=fnum(el?(el.value.trim()||'0'):'0');
      if(v===null){document.getElementById('errMsg').textContent='Valor no válido en fila '+(i+1)+', col '+(j+1)+'.';return null;}
      M[i].push(v);
    }
  }
  return M;
}

function confirmarMatriz(){
  if(matrizActual)return; // ya confirmada
  var M=leerMatriz();
  if(!M)return;
  matrizActual=M;detValue=null;adjCalculados={};
  document.getElementById('caja111').style.display='none';
  document.getElementById('caja112').style.display='';
  document.getElementById('caja2borde').style.display='';
  document.getElementById('errMsg').textContent='';
  renderMatrizDisplay(M);
  var r1=document.querySelector('input[name="adjOpc"][value="1"]');
  if(r1){r1.checked=true;actualizarParams(1);}
}

function renderMatrizDisplay(M){
  var n=M.length;
  var tbl='<table style="border-collapse:separate;border-spacing:6px"><tbody>';
  for(var i=0;i<n;i++){
    tbl+='<tr>';
    for(var j=0;j<n;j++){
      tbl+='<td style="padding:2px 6px;text-align:center;font-size:13px;font-weight:600;color:var(--ink)">'+M[i][j]+'</td>';
    }
    tbl+='</tr>';
  }
  tbl+='</tbody></table>';
  var html=
    '<div style="font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">MATRIZ INTRODUCIDA</div>'+
    '<div style="display:flex;align-items:center;gap:6px">'+
      '<span style="font-size:14px;font-weight:700;color:var(--ink);align-self:center">A =</span>'+
      '<div class="matrixWrap"><div class="mp lp"></div>'+tbl+'<div class="mp rp"></div></div>'+
    '</div>';
  document.getElementById('matrizDisplay').innerHTML=html;
}

// ── Matriz adjunta clicable ──────────────────────────────────────────────
function renderAdjMatrix(){
  var html='<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">Haz clic en un adjunto para calcularlo</div>';
  html+='<div style="display:inline-flex;align-items:center;gap:8px">';
  html+='<span style="font-size:13px;font-weight:700;color:var(--ink)">Adj(A) =</span>';
  html+='<div class="matrixWrap"><div class="mp lp"></div>';
  html+='<table style="border-collapse:separate;border-spacing:6px"><tbody>';
  for(var i=0;i<currentN;i++){
    html+='<tr>';
    for(var j=0;j<currentN;j++){
      var key=i+'_'+j;
      if(adjCalculados[key]){
        var v=adjCalculados[key];
        html+='<td><span class="adjCellDone">'+v+'</span></td>';
      } else {
        html+='<td><button class="adjCell" data-i="'+i+'" data-j="'+j+'">A<sub>'+(i+1)+''+(j+1)+'</sub></button></td>';
      }
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  html+='<div class="mp rp"></div></div></div>';
  return html;
}

window.seleccionarMenor=function(i,j){
  // Quitar active de otras celdas
  document.querySelectorAll('.adjCell').forEach(function(b){b.classList.remove('active');});
  var btn=document.querySelector('.adjCell[data-i="'+i+'"][data-j="'+j+'"]');
  if(btn)btn.classList.add('active');
  window.calcularMenorIJ(i,j);
};

// ── Paso 2: funciones globales ────────────────────────────────────────────
window.validarMenor=function(){
  var form=document.getElementById('minorForm');
  var ii=form?parseInt(form.dataset.ii):-1, jj=form?parseInt(form.dataset.jj):-1;
  if(isNaN(ii)||isNaN(jj)||!matrizActual)return;
  var n1=currentN-1;
  var sub=Matriz.quitarFilayColumna(matrizActual,ii,jj);
  var cSign=((ii+jj)%2===0)?1:-1;
  var cAdj=FraccionNumerica.multiplicar(String(cSign),Matriz.determinante(sub));
  var errors=[];
  // Signo
  var sv=(document.getElementById('mc_sign')||{}).value||'';sv=sv.trim();
  var signOk=cSign>0?(sv==='+'||sv==='+'):(sv==='-'||sv==='−'||sv==='−');
  if(!signOk)errors.push('signo (esperado '+(cSign>0?'+':'−')+')');
  // Celdas
  var cellOk=true;
  for(var r=0;r<n1&&cellOk;r++)for(var c=0;c<n1;c++){
    var v=fnum(((document.getElementById('mc_'+r+'_'+c))||{value:''}).value.trim());
    if(v===null||FraccionNumerica.simplificar(v)!==FraccionNumerica.simplificar(sub[r][c])){cellOk=false;break;}
  }
  if(!cellOk)errors.push('valores del menor');
  // Resultado
  var rv=fnum(((document.getElementById('mc_result'))||{value:''}).value.trim());
  if(rv===null||FraccionNumerica.simplificar(rv)!==FraccionNumerica.simplificar(cAdj))errors.push('resultado (esperado '+cAdj+')');
  var form=document.getElementById('minorForm');
  if(errors.length===0){
    adjCalculados[ii+'_'+jj]=cAdj;
    // Refrescar la matriz clicable con el valor nuevo
    var zona=document.getElementById('zonaParams');
    if(zona){
      var oldForm=document.getElementById('minorForm');
      var formHtml=oldForm?oldForm.outerHTML:'<div id="minorForm" style="margin-top:8px"></div>';
      zona.innerHTML=renderAdjMatrix()+'<div id="minorForm" style="margin-top:8px"></div>';
      var tabla=zona.querySelector('table');
      if(tabla){
        tabla.addEventListener('click',function(e){
          var btn=e.target.closest('.adjCell');
          if(!btn)return;
          var i=parseInt(btn.dataset.i),j=parseInt(btn.dataset.j);
          document.querySelectorAll('.adjCell').forEach(function(b){b.classList.remove('active');});
          btn.classList.add('active');
          window.calcularMenorIJ(i,j);
        });
      }
    }
    // Mantener el formulario visible con valores en readonly + indicador verde
    var newForm=document.getElementById('minorForm');
    if(newForm){
      // Indicador de correcto al inicio
      var ind=document.createElement('div');
      ind.style.cssText='color:#16a34a;font-weight:800;font-size:12px;margin-bottom:6px';
      ind.textContent='✓ Correcto — A'+(ii+1)+''+(jj+1)+' = '+cAdj;
      newForm.insertBefore(ind, newForm.firstChild);
      // Hacer inputs readonly y pintarlos en verde
      newForm.querySelectorAll('input[type="text"]').forEach(function(inp){
        inp.readOnly=true;
        inp.style.borderColor='#16a34a';
        inp.style.background='#f0fdf4';
      });
      // Ocultar botones de acción
      ['btnAutoMenor','mc_feedback','btnReintentar'].forEach(function(id){
        var el=document.getElementById(id);
        if(el)el.style.display='none';
      });
    }
    checkTodosAdj();
  } else {
    var fb=document.getElementById('mc_feedback');
    if(fb){
      fb.innerHTML='&nbsp;<span style="color:#b91c1c">✗ '+errors.join(' · ')+'</span>'+
        '&nbsp;<button id="btnReintentar">↺ Reintentar</button>';
      var br=document.getElementById('btnReintentar');
      if(br) br.addEventListener('click',function(){window.calcularMenorIJ(ii,jj);});
    }
  }
};

// ── ¿Todos los adjuntos correctos? → mostrar Adj(A) ──────────────────────
function checkTodosAdj(){
  for(var i=0;i<currentN;i++)
    for(var j=0;j<currentN;j++)
      if(!adjCalculados[i+'_'+j])return;
  // Limpiar paso 2 del formulario
  var zona=document.getElementById('zonaParams');
  if(zona)zona.innerHTML='';
  var row2=document.getElementById('pasoRow2');
  if(row2)row2.style.display='none';
  // Mostrar Adj(A) en el workspace sin cabecera extra
  var C=[];
  for(var i=0;i<currentN;i++){C.push([]);for(var j=0;j<currentN;j++)C[i].push(adjCalculados[i+'_'+j]);}
  addToCaja21(tablaMatriz(C,'Adj(A)','Paso 2 — Matriz adjunta'));
  // Seleccionar paso 3 automáticamente
  var r3=document.querySelector('input[name="adjOpc"][value="3"]');
  if(r3){r3.checked=true;actualizarParams(3);}
}

// ── calcularMenorIJ: muestra el formulario para i,j específicos ───────────
window.calcularMenorIJ=function(ii,jj){
  var form=document.getElementById('minorForm');
  if(!matrizActual||!form)return;
  if(adjCalculados[ii+'_'+jj]){
    var a=adjCalculados[ii+'_'+jj];
    form.innerHTML='<span style="color:#16a34a;font-weight:700">✓ A<sub>'+(ii+1)+''+(jj+1)+'</sub> = '+a+'</span>';return;
  }
  var n1=currentN-1;
  var tbl='<table style="border-collapse:separate;border-spacing:4px"><tbody>';
  for(var r=0;r<n1;r++){
    tbl+='<tr>';
    for(var c=0;c<n1;c++)
      tbl+='<td><input type="text" id="mc_'+r+'_'+c+'" style="width:38px;padding:3px;border:1.5px solid #d1d5db;border-radius:4px;text-align:center;font-size:13px;font-weight:600;background:#fff"></td>';
    tbl+='</tr>';
  }
  tbl+='</tbody></table>';
  form.innerHTML=
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px">'+
      '<span style="font-size:13px;font-weight:700">A<sub>'+(ii+1)+''+(jj+1)+'</sub> =</span>'+
      '<input type="text" id="mc_sign" placeholder="±" style="width:34px;padding:3px;border:1.5px solid #d1d5db;border-radius:4px;text-align:center;font-size:14px;font-weight:700;background:#fff">'+
      '<div class="detWrap"><div class="det-bar"></div>'+tbl+'<div class="det-bar"></div></div>'+
      '<span style="font-size:18px;font-weight:300">=</span>'+
      '<input type="text" id="mc_result" style="width:52px;padding:3px;border:1.5px solid #d1d5db;border-radius:4px;text-align:center;font-size:14px;font-weight:700;background:#fff">'+
      '<span id="mc_feedback" style="font-size:12px;font-weight:800;margin-left:4px"></span>'+
      '<button id="btnAutoMenor" style="margin-left:8px;font-size:11px;opacity:.7">Automático (no recomendable)</button>'+
    '</div>';
  // guardar ii,jj en el form para validarMenor
  form.dataset.ii=ii; form.dataset.jj=jj;
  // Botón automático: rellena las celdas y valida
  var btnAM=document.getElementById('btnAutoMenor');
  if(btnAM) btnAM.addEventListener('click',function(){
    var n1=currentN-1;
    var sub=Matriz.quitarFilayColumna(matrizActual,ii,jj);
    var cSign=((ii+jj)%2===0)?1:-1;
    var signEl=document.getElementById('mc_sign');
    if(signEl)signEl.value=cSign>0?'+':'−';
    for(var r=0;r<n1;r++) for(var c=0;c<n1;c++){
      var el=document.getElementById('mc_'+r+'_'+c);
      if(el)el.value=sub[r][c];
    }
    var resEl=document.getElementById('mc_result');
    var cAdj=FraccionNumerica.multiplicar(String(cSign),Matriz.determinante(sub));
    if(resEl)resEl.value=cAdj;
    // Ocultar botón automático y mostrar botón OK
    btnAM.style.display='none';
    var fb=document.getElementById('mc_feedback');
    if(fb){
      fb.innerHTML='<button id="btnOkAuto" style="margin-left:6px;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;border:none;padding:5px 14px;border-radius:6px;font-weight:800;cursor:pointer">OK</button>';
      var btnOk=document.getElementById('btnOkAuto');
      if(btnOk) btnOk.addEventListener('click',function(){window.validarMenor();});
    }
  });
  var ids=['mc_sign'];
  for(var r=0;r<n1;r++) for(var c=0;c<n1;c++) ids.push('mc_'+r+'_'+c);
  ids.push('mc_result');
  ids.forEach(function(id,idx){
    var el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key==='Tab'){
        e.preventDefault();
        if(idx<ids.length-1){var nx=document.getElementById(ids[idx+1]);if(nx)nx.focus();}
        else{window.validarMenor();}
      }
    });
  });
  document.getElementById('mc_sign').focus();
};

// ── Panel de opciones ────────────────────────────────────────────────────
function actualizarParams(opc){
  var zona=document.getElementById('zonaParams');
  document.getElementById('errMsg').textContent='';
  if(opc===2){
    zona.innerHTML=renderAdjMatrix()+'<div id="minorForm" style="margin-top:8px"></div>';
    // Delegación de eventos para las celdas clicables
    var tabla=zona.querySelector('table');
    if(tabla){
      tabla.addEventListener('click',function(e){
        var btn=e.target.closest('.adjCell');
        if(!btn)return;
        var i=parseInt(btn.dataset.i), j=parseInt(btn.dataset.j);
        document.querySelectorAll('.adjCell').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        window.calcularMenorIJ(i,j);
      });
    }
    return;
  }
  zona.innerHTML='';
}

function ejecutarOpcion(){
  var r=document.querySelector('input[name="adjOpc"]:checked');
  if(!r)return;
  var opc=parseInt(r.value);
  document.getElementById('errMsg').textContent='';

  if(opc===1){
    detValue=Matriz.determinante(matrizActual);
    var ds=detValue;
    var html='<div class="adjResultCard">'+
      '<div class="adjResultCardTitle">Opción 1 — Cálculo del determinante</div>'+
      '<div class="adjResultCardBody">'+
        '<div style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">'+
          '<span style="font-size:13px;font-weight:700;color:var(--ink)">det(A) =</span>'+
          '<div class="detWrap"><div class="det-bar"></div>'+matrizTbl(matrizActual)+'<div class="det-bar"></div></div>'+
          '<span style="font-size:13px;font-weight:700;color:var(--ink)">= <strong class="adjVal">'+ds+'</strong>'+(detValue!=="0"?' ≠ 0':'')+'</span>'+
        '</div>'+
        '<span>'+(detValue==="0"
          ?'⚠ La matriz es <strong>singular</strong> y no tiene inversa.'
          :'✓ La matriz es <strong>invertible</strong>.')+
        '</span>'+
      '</div></div>';
    addToCaja21(html);
    // Paso 1 completado: ocultar su fila y pasar al paso 2
    var row1=document.getElementById('pasoRow1');
    if(row1)row1.style.display='none';
    var r2=document.querySelector('input[name="adjOpc"][value="2"]');
    if(r2){r2.checked=true;actualizarParams(2);}

  } else if(opc===2){
    if(detValue===null)detValue=Matriz.determinante(matrizActual);
    // El botón Seleccionar actúa como validar si ya hay formulario, o como calcular si no
    var form=document.getElementById('minorForm');
    if(form&&document.getElementById('mc_sign')){
      window.validarMenor();
    } else {
      document.getElementById('errMsg').textContent='Haz clic en uno de los adjuntos A_ij de la tabla para calcularlo.';
    }

  } else if(opc===3){
    if(detValue===null){document.getElementById('errMsg').textContent='Calcula primero el determinante (Paso 1).';return;}
    if(detValue==="0"){document.getElementById('errMsg').textContent='La matriz es singular.';return;}
    var Adj=Matriz.trasponer(Matriz.adjunta(matrizActual));
    var html=tablaMatriz(Adj,'Adj(A)ᵗ','Paso 3 — Matriz adjunta transpuesta');
    addToCaja21(html);
    // Paso 3 completado: ocultar y pasar al 4
    var row3=document.getElementById('pasoRow3');
    if(row3)row3.style.display='none';
    var r4=document.querySelector('input[name="adjOpc"][value="4"]');
    if(r4){r4.checked=true;actualizarParams(4);}

  } else if(opc===4){
    if(detValue===null){document.getElementById('errMsg').textContent='Calcula primero el determinante (Paso 1).';return;}
    if(detValue==="0"){document.getElementById('errMsg').textContent='La matriz es singular. No existe la inversa.';return;}
    var Adj=Matriz.trasponer(Matriz.adjunta(matrizActual));
    var Inv=dividirMatriz(Adj,detValue);
    addToCaja21(tablaInversaFormula(Adj,Inv,detValue,'Paso 4 — Matriz inversa'));
    // Paso 4 completado: ocultar fila y mostrar resultado final en el formulario
    var row4=document.getElementById('pasoRow4');
    if(row4)row4.style.display='none';
    document.getElementById('zonaParams').innerHTML='';
    document.getElementById('errMsg').textContent='';
    // Ocultar botones de pasos y mostrar resultado final en su lugar
    document.getElementById('cajaOpcBtns').style.display='none';
    document.getElementById('cajaOpcTitulo').textContent='RESULTADO FINAL';
    // Construir display del resultado final en el panel
    document.getElementById('cajaOpcLista').style.display='none';
    var resHtml=
      '<div style="padding:8px 0" id="resultadoFinal">'+
        tablaInversaFormula(Adj,Inv,detValue,'')+
      '</div>';
    document.getElementById('zonaParams').innerHTML=resHtml;
    if(window.renderMathInElement){
      renderMathInElement(document.getElementById('resultadoFinal'),{
        delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],
        throwOnError:false
      });
    }
  }
}

function addToCaja21(html){
  var z=document.getElementById('caja21');
  z.innerHTML+=html;
  z.scrollTop=z.scrollHeight;
}

// ── Tabla interna de menores con signo (sin envoltorio) ──────────────────
function menoresTblInner(M){
  var n=M.length;
  var tbl='<table style="border-collapse:separate;border-spacing:10px"><tbody>';
  for(var i=0;i<n;i++){
    tbl+='<tr>';
    for(var j=0;j<n;j++){
      var signo=((i+j)%2===0)?'+':'−';
      var sigColor=((i+j)%2===0)?'color:var(--ink)':'color:#c0392b';
      var sub=Matriz.quitarFilayColumna(M,i,j);
      var subTbl='<table style="border-collapse:separate;border-spacing:3px"><tbody>';
      for(var si=0;si<sub.length;si++){
        subTbl+='<tr>';
        for(var sj=0;sj<sub[si].length;sj++){
          subTbl+='<td style="padding:1px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--ink)">'+sub[si][sj]+'</td>';
        }
        subTbl+='</tr>';
      }
      subTbl+='</tbody></table>';
      tbl+='<td style="text-align:center;vertical-align:middle;padding:4px 6px">'+
        '<div style="display:inline-flex;align-items:center;gap:2px">'+
          '<span style="font-size:13px;font-weight:700;'+sigColor+'">'+signo+'</span>'+
          '<div class="detWrap"><div class="det-bar"></div>'+subTbl+'<div class="det-bar"></div></div>'+
        '</div></td>';
    }
    tbl+='</tr>';
  }
  return tbl+'</tbody></table>';
}

// ── Tabla interna (sin envoltorio) ───────────────────────────────────────
function matrizTbl(M){
  var n=M.length;
  var t='<table style="border-collapse:separate;border-spacing:6px"><tbody>';
  for(var i=0;i<n;i++){
    t+='<tr>';
    for(var j=0;j<n;j++){
      t+='<td style="padding:3px 7px;text-align:center;font-size:13px;font-weight:600;color:var(--ink)">'+M[i][j]+'</td>';
    }
    t+='</tr>';
  }
  return t+'</tbody></table>';
}

// ── Tablas de resultados ─────────────────────────────────────────────────
// nombre: notación matemática mostrada antes de la matriz (p.e. "Adj(A)")
// desc:   etiqueta descriptiva pequeña encima (opcional)
function tablaMatriz(M,nombre,desc){
  var tbl=matrizTbl(M);
  var html='<div class="resultBloque" style="max-width:100%">';
  if(desc) html+='<div style="font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">'+desc+'</div>';
  html+='<div style="display:inline-flex;align-items:center;gap:8px">';
  if(nombre) html+='<span style="font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap">'+nombre+' =</span>';
  html+='<div class="matrixWrap"><div class="mp lp"></div>'+tbl+'<div class="mp rp"></div></div>';
  html+='</div></div>';
  return html;
}

function tablaInversaFormula(adjT,inv,det,desc){
  var adjTbl=matrizTbl(adjT);
  var resTbl=matrizTbl(inv);
  var html='<div class="resultBloque" style="max-width:100%">';
  if(desc) html+='<div style="font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">'+desc+'</div>';
  html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow-x:auto;max-width:100%;padding-bottom:2px">';
  html+='<span style="font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap">A⁻¹ =</span>';
  html+='<span style="font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap">(1/det(A)) · Adj(A)ᵗ</span>';
  html+='<span style="font-size:18px;font-weight:300;color:var(--ink)">=</span>';
  html+='<span style="font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap">(1/'+det+')</span>';
  html+='<span style="font-size:16px;font-weight:300;color:var(--ink)">·</span>';
  html+='<div class="matrixWrap"><div class="mp lp"></div>'+adjTbl+'<div class="mp rp"></div></div>';
  html+='<span style="font-size:18px;font-weight:300;color:var(--ink)">=</span>';
  html+='<div class="matrixWrap"><div class="mp lp"></div>'+resTbl+'<div class="mp rp"></div></div>';
  html+='</div></div>';
  return html;
}

// ── Álgebra ──────────────────────────────────────────────────────────────
function dividirMatriz(M,d){return M.map(function(row){return row.map(function(x){return FraccionNumerica.dividir(x,d);});});}

// ── Solución automática ──────────────────────────────────────────────────
function solucionAutomatica(){
  var M=matrizActual;
  if(!M)return;
  var caja21=document.getElementById('caja21');
  caja21.innerHTML='';
  document.getElementById('zonaParams').innerHTML='';
  document.getElementById('errMsg').textContent='';
  var D=Matriz.determinante(M);detValue=D;
  // Opción 1
  var ds=D;
  var html='<div class="adjResultCard">'+
    '<div class="adjResultCardTitle">Opción 1 — Cálculo del determinante</div>'+
    '<div class="adjResultCardBody">'+
      '<div style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">'+
        '<span style="font-size:13px;font-weight:700;color:var(--ink)">det(A) =</span>'+
        '<div class="detWrap"><div class="det-bar"></div>'+matrizTbl(M)+'<div class="det-bar"></div></div>'+
        '<span style="font-size:13px;font-weight:700;color:var(--ink)">= <strong class="adjVal">'+ds+'</strong>'+(D!=="0"?' ≠ 0':'')+'</span>'+
      '</div>'+
      '<span>'+(D==="0"
        ?'⚠ La matriz es <strong>singular</strong> y no tiene inversa.'
        :'✓ La matriz es <strong>invertible</strong>.')+
      '</span>'+
    '</div></div>';
  if(D!=="0"){
    var Adj=Matriz.adjunta(M),C=Matriz.trasponer(Adj),Inv=dividirMatriz(C,D);
    // Los tres bloques en la misma línea
    html+='<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start">';
    // Bloque 1: Adj(A) — menores sin calcular + valores, todo centrado
    html+='<div class="resultBloque" style="text-align:center">';
    html+='<div style="font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">Matriz adjunta</div>';
    html+='<div style="display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:12px">';
    html+='<div style="display:inline-flex;align-items:center;gap:8px">'+
      '<span style="font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap">Adj(A) =</span>'+
      '<div class="matrixWrap"><div class="mp lp"></div>'+menoresTblInner(M)+'<div class="mp rp"></div></div>'+
      '</div>';
    html+='<div style="display:inline-flex;align-items:center;gap:8px">'+
      '<span style="font-size:20px;font-weight:300;color:var(--ink)">=</span>'+
      '<div class="matrixWrap"><div class="mp lp"></div>'+matrizTbl(Adj)+'<div class="mp rp"></div></div>'+
      '</div>';
    html+='</div></div>';
    // Bloque 2 y 3: Adj(A)^t e inversa
    html+=tablaMatriz(C,'Adj(A)ᵗ','Traspuesta de la adjunta');
    html+=tablaInversaFormula(C,Inv,D,'Matriz inversa');
    html+='</div>';
  }
  caja21.innerHTML=html;
  caja21.scrollTop=caja21.scrollHeight;
  if(window.renderMathInElement){
    renderMathInElement(caja21,{
      delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],
      throwOnError:false
    });
  }
}

})();
</script>

function mkToggle(btn){
  var sol=btn.nextElementSibling;
  var open=sol.classList.toggle("mk-visible");
  btn.classList.toggle("mk-open",open);
  btn.textContent=open?"Ocultar solución":"Ver solución";
}

      throwOnError:false
