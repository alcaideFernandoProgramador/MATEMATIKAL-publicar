<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pruebas Matematikal</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2933;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
    }

    .summary {
      margin: 18px 0;
      padding: 14px 16px;
      border: 1px solid #d8dee8;
      background: #fff;
      border-radius: 8px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 20px 0;
    }

    button {
      border: 1px solid #aab4c3;
      border-radius: 6px;
      background: #fff;
      color: #17202a;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      background: #edf2f7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #d8dee8;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e9f0;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #eef2f7;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    code {
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .ok {
      color: #0f766e;
      font-weight: 700;
    }

    .fail {
      color: #b42318;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pruebas de matematikal_funciones_2.0.js</h1>
    <p>Ejecuta pruebas rapidas de la biblioteca en el navegador.</p>

    <div id="summary" class="summary">Preparando pruebas...</div>

    <div class="toolbar">
      <button type="button" id="runTests">Ejecutar de nuevo</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Estado</th>
          <th>Prueba</th>
          <th>Detalle</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </main>

  <script src="CARPETAS_AUXILIARES/BIBLIOTECA_MATEMATIKAL_2.0/matematikal_funciones_2.0.js"></script>
  <script>
    const tests = [
      {
        name: "ExpresionNumerica.postfijaAInfija convierte suma basica",
        run() {
          return assertEqual(ExpresionNumerica.postfijaAInfija(["2", "3", "+"]), "2+3");
        }
      },
      {
        name: "FraccionNumerica.sumar simplifica 1/2 + 1/3",
        run() {
          return assertEqual(FraccionNumerica.sumar("1/2", "1/3"), "5/6");
        }
      },
      {
        name: "FraccionNumerica.parseFraccion conserva numerador con denominador cero",
        run() {
          return assertDeepEqual(FraccionNumerica.parseFraccion("1/0"), ["1", "0"]);
        }
      },
      {
        name: "FraccionNumerica.simplificar detecta denominador cancelado",
        run() {
          return assertEqual(FraccionNumerica.simplificar("1/(1-1)"), "Error: divisi\u00F3n por 0");
        }
      },
      {
        name: "FraccionNumerica.parseFraccion rechaza fraccion algebraica",
        run() {
          return assertThrows(
            () => FraccionNumerica.parseFraccion("x/2"),
            "FraccionNumerica solo admite numerador numerico"
          );
        }
      },
      {
        name: "FraccionNumerica.potencia calcula exponente negativo",
        run() {
          return assertEqual(FraccionNumerica.potencia("2/3", -2), "9/4");
        }
      },
      {
        name: "FraccionNumerica.potencia rechaza cero con exponente negativo",
        run() {
          return assertEqual(FraccionNumerica.potencia("0", -1), "Error: divisi\u00F3n por 0");
        }
      },
      {
        name: "FraccionNumerica.potencia rechaza denominador cero",
        run() {
          return assertEqual(FraccionNumerica.potencia("1/0", 2), "Error: divisi\u00F3n por 0");
        }
      },
      {
        name: "FraccionNumerica.potencia rechaza exponente no entero",
        run() {
          return assertEqual(FraccionNumerica.potencia("2", "2/3"), "Error: el exponente debe ser entero");
        }
      },
      {
        name: "FraccionNumerica.sumar rechaza denominador cero",
        run() {
          return assertEqual(FraccionNumerica.sumar("1/0", "1/2"), "Error: divisi\u00F3n por 0");
        }
      },
      {
        name: "FraccionNumerica.restar rechaza denominador cero",
        run() {
          return assertEqual(FraccionNumerica.restar("1/2", "1/0"), "Error: divisi\u00F3n por 0");
        }
      },
      {
        name: "FraccionNumerica.multiplicar rechaza denominador cero",
        run() {
          return assertEqual(FraccionNumerica.multiplicar("1/0", "0"), "Error: divisi\u00F3n por 0");
        }
      },
      {
        name: "FraccionAlgebraica.parseFraccion simplifica ambos lados",
        run() {
          const [num, den] = FraccionAlgebraica.parseFraccion("(x-x+1)/(y-y+2)");
          return assertDeepEqual([num.toString(), den.toString()], ["1", "2"]);
        }
      },
      {
        name: "FraccionAlgebraica.numerador simplifica cancelaciones",
        run() {
          return assertEqual(FraccionAlgebraica.numerador("(x-x)/(y+1)"), "0");
        }
      },
      {
        name: "FraccionAlgebraica.denominador simplifica cancelaciones",
        run() {
          return assertEqual(FraccionAlgebraica.denominador("1/(x-x)"), "0");
        }
      },
      {
        name: "FraccionAlgebraica.sumar detecta denominador cero",
        run() {
          return assertEqual(FraccionAlgebraica.sumar("1/(x-x)", "1"), "\u221E");
        }
      },
      {
        name: "FraccionAlgebraica.restar detecta denominador cero",
        run() {
          return assertEqual(FraccionAlgebraica.restar("1", "1/(x-x)"), "\u221E");
        }
      },
      {
        name: "FraccionAlgebraica.multiplicar no oculta denominador cero",
        run() {
          return assertEqual(FraccionAlgebraica.multiplicar("1/(x-x)", "0"), "\u221E");
        }
      },
      {
        name: "FraccionAlgebraica.dividir detecta divisor invalido",
        run() {
          return assertEqual(FraccionAlgebraica.dividir("1", "1/(x-x)"), "\u221E");
        }
      },
      {
        name: "FraccionAlgebraica.dividir detecta divisor cero",
        run() {
          return assertEqual(FraccionAlgebraica.dividir("1", "x-x"), "\u221E");
        }
      },
      {
        name: "FraccionAlgebraica.sumar opera denominadores algebraicos",
        run() {
          const resultado = FraccionAlgebraica.sumar("1/(x+1)", "1/(x-1)");
          assertFractionAlgebraicallyEqual(resultado, "2x/(x^2-1)");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.restar opera denominadores algebraicos",
        run() {
          const resultado = FraccionAlgebraica.restar("1/(x-1)", "1/(x+1)");
          assertFractionAlgebraicallyEqual(resultado, "2/(x^2-1)");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.multiplicar cancela factores comunes",
        run() {
          const resultado = FraccionAlgebraica.multiplicar("(x^2-1)/(x+1)", "1/(x-1)");
          assertFractionAlgebraicallyEqual(resultado, "1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.dividir invierte y simplifica",
        run() {
          const resultado = FraccionAlgebraica.dividir("(x^2-1)/(x+1)", "x-1");
          assertFractionAlgebraicallyEqual(resultado, "1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.sumar acepta instancias",
        run() {
          const resultado = FraccionAlgebraica.sumar(new FraccionAlgebraica("1/x"), new FraccionAlgebraica("1/x"));
          assertFractionAlgebraicallyEqual(resultado, "2/x");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.parseFraccion rechaza doble barra superior",
        run() {
          return assertThrows(() => FraccionAlgebraica.parseFraccion("1/x/y"), "/");
        }
      },
      {
        name: "FraccionAlgebraica.parseFraccion rechaza denominador vacio",
        run() {
          return assertThrows(() => FraccionAlgebraica.parseFraccion("x/"), "Denominador");
        }
      },
      {
        name: "FraccionAlgebraica.parseFraccion rechaza parentesis desbalanceados",
        run() {
          return assertThrows(() => FraccionAlgebraica.parseFraccion("(x+1)/(x-1"), "desbalanceados");
        }
      },
      {
        name: "FraccionAlgebraica.simplificar normaliza signo en denominador",
        run() {
          const resultado = FraccionAlgebraica.simplificar("x/(-2)");
          assertFractionAlgebraicallyEqual(resultado, "-x/2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.simplificar cancela doble signo",
        run() {
          const resultado = FraccionAlgebraica.simplificar("(-x)/(-2)");
          assertFractionAlgebraicallyEqual(resultado, "x/2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.simplificar cancela factor con coeficiente",
        run() {
          const resultado = FraccionAlgebraica.simplificar("(2x+2)/(4x+4)");
          assertFractionAlgebraicallyEqual(resultado, "1/2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.simplificar cancela factor cuadratico",
        run() {
          const resultado = FraccionAlgebraica.simplificar("(x^2+2x+1)/(x+1)");
          assertFractionAlgebraicallyEqual(resultado, "x+1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.simplificar conserva irreducible",
        run() {
          const resultado = FraccionAlgebraica.simplificar("(x+1)/(x+2)");
          assertFractionAlgebraicallyEqual(resultado, "(x+1)/(x+2)");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.sumar denominadores iguales",
        run() {
          const resultado = FraccionAlgebraica.sumar("x/(x+1)", "1/(x+1)");
          assertFractionAlgebraicallyEqual(resultado, "1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.restar fracciones iguales da cero",
        run() {
          const resultado = FraccionAlgebraica.restar("(x+1)/(x-1)", "(x+1)/(x-1)");
          assertFractionAlgebraicallyEqual(resultado, "0");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.multiplicar por cero conserva denominador valido",
        run() {
          const resultado = FraccionAlgebraica.multiplicar("(x+1)/(x-1)", "0");
          assertFractionAlgebraicallyEqual(resultado, "0");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.dividir por uno conserva fraccion",
        run() {
          const resultado = FraccionAlgebraica.dividir("(x+1)/(x-1)", "1");
          assertFractionAlgebraicallyEqual(resultado, "(x+1)/(x-1)");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.simplificar acepta variable griega",
        run() {
          const resultado = FraccionAlgebraica.simplificar("(\u03BB^2-1)/(\u03BB-1)");
          assertFractionAlgebraicallyEqual(resultado, "\u03BB+1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.sumar acepta variables con subindice",
        run() {
          const resultado = FraccionAlgebraica.sumar("1/x_1", "1/x_1");
          assertFractionAlgebraicallyEqual(resultado, "2/x_1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "FraccionAlgebraica.esFraccionAlgebraica distingue fracciones",
        run() {
          const resultado = [
            FraccionAlgebraica.esFraccionAlgebraica("(x+1)/(x-1)"),
            FraccionAlgebraica.esFraccionAlgebraica("x+1")
          ];
          return assertDeepEqual(resultado, [true, false]);
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar expande potencia",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("(x+1)^2");
          assertAlgebraicallyEqual(resultado, "x^2+2x+1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar resuelve producto implicito",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("2(x+1)");
          assertAlgebraicallyEqual(resultado, "2x+2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar cancela division algebraica",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("(x^2-1)/(x-1)");
          assertFractionAlgebraicallyEqual(resultado, "x+1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar suma fracciones algebraicas",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("1/x+1/x");
          assertFractionAlgebraicallyEqual(resultado, "2/x");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar eleva fraccion algebraica",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("(1/x)^2");
          assertFractionAlgebraicallyEqual(resultado, "1/x^2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.pasarALatex convierte fraccion",
        run() {
          return assertEqual(ExpresionAlgebraica.pasarALatex("(x+1)/(x-1)"), "\\dfrac{x+1}{x-1}");
        }
      },
      {
        name: "ExpresionAlgebraica.pasarALatex convierte potencia",
        run() {
          return assertEqual(ExpresionAlgebraica.pasarALatex("(x+1)^2"), "\\left(x+1\\right)^{2}");
        }
      },
      {
        name: "ExpresionAlgebraica.pasarALatex convierte funcion trigonometrica",
        run() {
          return assertEqual(ExpresionAlgebraica.pasarALatex("sin(x)^2"), "\\sin^{2}\\left(x\\right)");
        }
      },
      {
        name: "ExpresionAlgebraica.pasarALatex convierte raiz",
        run() {
          return assertEqual(ExpresionAlgebraica.pasarALatex("sqrt(x+1)"), "\\sqrt{x+1}");
        }
      },
      {
        name: "Matriz.aLatex aplica latex a cada entrada",
        run() {
          return assertDeepEqual(
            Matriz.aLatex([["1/2", "x^2"], ["sin(x)", "\u03BB_1"]]),
            [["\\dfrac{1}{2}", "x^{2}"], ["\\sin\\left(x\\right)", "\u03BB_1"]]
          );
        }
      },
      {
        name: "ExpresionAlgebraica.notacionConProductos inserta productos implicitos",
        run() {
          return assertEqual(ExpresionAlgebraica.notacionConProductos("2x(x+1)"), "2*x*(x+1)");
        }
      },
      {
        name: "ExpresionAlgebraica.notacionConProductos conserva llamada de funcion",
        run() {
          return assertEqual(ExpresionAlgebraica.notacionConProductos("2sin(x)"), "2*sin(x)");
        }
      },
      {
        name: "ExpresionAlgebraica.notacionConProductos acepta variable griega",
        run() {
          return assertEqual(ExpresionAlgebraica.notacionConProductos("2\u03BB(x+1)"), "2*\u03BB*(x+1)");
        }
      },
      {
        name: "ExpresionAlgebraica.notacionSinProductos quita productos visuales",
        run() {
          return assertEqual(ExpresionAlgebraica.notacionSinProductos("2*x*(x+1)"), "2x(x+1)");
        }
      },
      {
        name: "ExpresionAlgebraica.pasarAFraccion convierte decimal",
        run() {
          return assertEqual(ExpresionAlgebraica.pasarAFraccion("0.5x+1.25"), "1/2x+5/4");
        }
      },
      {
        name: "ExpresionAlgebraica.pasarADecimal convierte fracciones numericas",
        run() {
          return assertEqual(ExpresionAlgebraica.pasarADecimal("1/2+3/4"), "0.5+0.75");
        }
      },
      {
        name: "ExpresionAlgebraica.sustituir evalua producto implicito",
        run() {
          return assertEqual(ExpresionAlgebraica.sustituir("2x+1", "x", "3"), "7");
        }
      },
      {
        name: "ExpresionAlgebraica.sustituir acepta valor fraccionario",
        run() {
          const resultado = ExpresionAlgebraica.pasarAFraccion(ExpresionAlgebraica.sustituir("x^2+1", "x", "1/2"));
          return assertEqual(resultado, "5/4");
        }
      },
      {
        name: "ExpresionAlgebraica.sustituir acepta variable griega",
        run() {
          return assertEqual(ExpresionAlgebraica.sustituir("\u03BB^2+1", "\u03BB", "3"), "10");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar devuelve cero en expresion vacia",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar(""), "0");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar combina terminos semejantes",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("x+x"), "2x");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar cancela terminos iguales",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("x-x"), "0");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar combina coeficientes",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("2x+3x-1"), "5x-1");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar respeta parentesis en suma",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("(x+1)+(x-1)"), "2x");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar respeta parentesis en resta",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("(x+1)-(x-1)"), "2");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar distribuye producto implicito",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("x(x+1)"), "x^2+x");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar multiplica binomios conjugados",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("(x+1)(x-1)"), "x^2-1");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar eleva binomio al cuadrado",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("(x+1)^2"), "x^2+2x+1");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar potencia cero",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("x^0"), "1");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar potencia uno",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("(x+2)^1"), "x+2");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar calcula constantes",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("2+3*4"), "14");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar convierte decimal a fraccion",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("0.5x+0.25x"), "3/4x");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar suma fracciones numericas",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("1/2+1/3"), "5/6");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar suma fracciones algebraicas",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("x/2+x/3");
          assertFractionAlgebraicallyEqual(resultado, "5x/6");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar cancela fraccion algebraica simple",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("(x^2-1)/(x-1)");
          assertAlgebraicallyEqual(resultado, "x+1");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar multiplica fracciones algebraicas",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("(x/2)*(4/x)");
          assertFractionAlgebraicallyEqual(resultado, "2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar divide fracciones algebraicas",
        run() {
          const resultado = ExpresionAlgebraica.simplificar("(x/2)/(x/4)");
          assertFractionAlgebraicallyEqual(resultado, "2");
          return `Resultado: ${JSON.stringify(resultado)}`;
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar maneja signo unario",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("-(x-1)"), "-x+1");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar maneja doble negativo",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("-(-x+1)"), "x-1");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar elimina producto por cero",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("0*(x+1)"), "0");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar elimina suma con cero",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("x+0"), "x");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar acepta variable griega",
        run() {
          return assertEqual(ExpresionAlgebraica.simplificar("2\u03BB+\u03BB"), "3\u03BB");
        }
      },
      {
        name: "ExpresionAlgebraica.simplificar acepta subindices",

    function assertEqual(actual, expected) {
      if (actual !== expected) {
        throw new Error(`Esperado ${JSON.stringify(expected)}, recibido ${JSON.stringify(actual)}`);
      }
      return `Resultado: ${JSON.stringify(actual)}`;
    }

    function assertDeepEqual(actual, expected) {
      const a = JSON.stringify(actual);
      const e = JSON.stringify(expected);
      if (a !== e) {
        throw new Error(`Esperado ${e}, recibido ${a}`);
      }
      return `Resultado: ${a}`;
    }

    function generarPruebasPolinomioFactorizar() {

    function generarPruebasFactoresCanonicos() {
      const casos = [
        // Constantes
        "1", "2", "3", "-1", "-2", "6",
        // Lineales
        "x", "x-1", "x+1", "2x", "2x-2", "3x+6", "-x+1", "-2x+4", "2x-1", "3x-9",
        // Cuadraticos cuadrado perfecto
        "x^2", "x^2+2x+1", "x^2-2x+1", "x^2+4x+4", "x^2-4x+4",
        "4x^2+4x+1", "9x^2-6x+1", "x^2+6x+9", "x^2-6x+9",
        // Cuadraticos diferencia de cuadrados
        "x^2-1", "x^2-4", "x^2-9", "4x^2-1", "9x^2-4", "16x^2-25", "25x^2-9", "x^2-3x-10",
        // Cuadraticos generales
        "x^2+3x+2", "x^2-3x+2", "x^2+5x+6", "x^2-5x+6",
        "x^2+x-6", "x^2-x-6", "2x^2+4x+2", "3x^2-12",
        "2x^2+7x+3", "2x^2+5x+2",
        // Cubicos
        "x^3", "x^3-1", "x^3+1", "x^3-x", "x^3-4x",
        "x^3+3x^2+3x+1", "x^3-3x^2+3x-1",
        "x^3-x^2-x+1", "x^3+4x^2+5x+2", "x^3-6x^2+11x-6",
        "2x^3-2x",
        // Cuarticos
        "x^4-1", "x^4-2x^2+1", "x^4+4x^3+6x^2+4x+1", "2x^4-2", "3x^4-3x^2",
        // Coeficiente lider no unario
        "2x^2-2", "3x^2+6x+3", "4x^2-4", "-x^2+1", "-x^2-2x-1", "3x^3+3x^2-6x",
        // Coeficientes fraccionarios
        "1/2x^2-1/2", "1/3x^2+2/3x+1/3", "2/3x^2-2/3",
        // Dos variables
        "x^2-y^2", "x^2+2xy+y^2", "x^2-2xy+y^2",
        "xy+x+y+1", "xy-x+y-1",
        "2xy+2x+3y+3", "a^2-b^2", "m^2-n^2",
        "x^2y-xy^2", "x^2+2xy+y^2-1",
        "x^3+y^3", "x^3-y^3",
        "x^2+3xy+2y^2", "2x^2+5xy+2y^2",
        // Variables con subindice
        "x_1^2-1", "x_1^2-y_1^2", "x_1^2+2x_1+1", "x_1^3-x_1",
        // Variables griegas
        "\\u03BB^2-1", "\\u03BB^2+2\\u03BB+1", "\\u03BB^3-\\u03BB", "\\u03BB^2-4",
        // Irreducibles sobre Q
        "x^2+1", "x^2+x+1", "x^2+4",
        // Miscelanea
        "x^2+xy", "x^2y+xy^2", "3x^2y+6xy",
        "xy+x-y-1", "3xy-3x+2y-2",
        "u^2-v^2+u-v", "p^2+2pq+q^2"
      ];

      return casos.map((polinomio, indice) => ({
        name: `Polinomio.factoresCanonicos bateria ${String(indice + 1).padStart(3, "0")} ${polinomio}`,
        run() {
          const expresion = polinomio.replace(/\\u([0-9A-Fa-f]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
          const factores = Polinomio.factoresCanonicos(expresion);
          // El producto de los factores debe ser algebraicamente igual al original
          assertAlgebraicallyEqual(productoFactores(factores), expresion);
          // El primer elemento debe ser un numero puro
          const primero = factores[0];
          if (!/^-?\d+(\/\d+)?$/.test(primero)) {
            throw new Error(`Se esperaba coeficiente numerico al inicio, recibido: ${JSON.stringify(primero)}`);
          }
          // Los factores no numericos deben ser monicos (coeficiente lider = 1)
          for (let i = 1; i < factores.length; i++) {
            const lm = Polinomio.elegirMonomioMayorGrado(factores[i]);
            const coef = Monomio.obtenerCoeficiente(lm);
            if (Math.abs(coef - 1) > 1e-9) {
              throw new Error(`Factor no monico en posicion ${i}: ${factores[i]} (coeficiente lider = ${coef})`);
            }
          }
          return `Resultado: ${JSON.stringify(factores)}`;
        }
      }));
    }

    function assertThrows(fn, messagePart) {
      try {
        fn();
      } catch (error) {
        const message = String(error && error.message ? error.message : error);
        if (!sinAcentos(message).includes(sinAcentos(messagePart))) {
          throw new Error(`El error no contiene ${JSON.stringify(messagePart)}. Recibido: ${message}`);
        }
        return `Error esperado: ${message}`;
      }
      throw new Error("Se esperaba un error, pero no se lanzo ninguno.");
    }

    function assertAlgebraicallyEqual(actual, expected) {
      const diferencia = ExpresionAlgebraica.simplificar(`(${actual})-(${expected})`);
      if (diferencia !== "0") {
        throw new Error(`Esperado equivalente a ${JSON.stringify(expected)}, recibido ${JSON.stringify(actual)}. Diferencia: ${diferencia}`);
      }
      return `Resultado equivalente: ${JSON.stringify(actual)}`;
    }

    function assertFractionAlgebraicallyEqual(actual, expected) {
      const an = FraccionAlgebraica.numerador(actual);
      const ad = FraccionAlgebraica.denominador(actual);
      const en = FraccionAlgebraica.numerador(expected);
      const ed = FraccionAlgebraica.denominador(expected);
      const diferencia = ExpresionAlgebraica.simplificar(`((${an})*(${ed}))-((${en})*(${ad}))`);
      if (diferencia !== "0") {
        throw new Error(`Esperado equivalente a ${JSON.stringify(expected)}, recibido ${JSON.stringify(actual)}. Diferencia cruzada: ${diferencia}`);
      }
      return `Resultado equivalente: ${JSON.stringify(actual)}`;
    }

    function productoFactores(factores) {
      return factores.reduce((acc, factor) => `(${acc})*(${factor})`, "1");
    }

    function sinAcentos(text) {
      return String(text).normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function runTests() {
      const results = document.getElementById("results");
      const summary = document.getElementById("summary");
      results.textContent = "";

      let passed = 0;
      for (const test of tests) {
        const row = document.createElement("tr");
        const status = document.createElement("td");
        const name = document.createElement("td");
        const detail = document.createElement("td");

        name.textContent = test.name;
        try {
          const message = test.run();
          status.textContent = "OK";
          status.className = "ok";
          detail.appendChild(code(message || "Correcto"));
          passed++;
        } catch (error) {
          status.textContent = "FALLO";
          status.className = "fail";
          detail.appendChild(code(error && error.stack ? error.stack : String(error)));
        }

        row.appendChild(status);
        row.appendChild(name);
        row.appendChild(detail);
        results.appendChild(row);
      }

      const failed = tests.length - passed;
      summary.textContent = `${passed}/${tests.length} pruebas correctas${failed ? `, ${failed} fallidas` : ""}.`;
      summary.className = failed ? "summary fail" : "summary ok";
    }

    function code(text) {
      const el = document.createElement("code");
      el.textContent = text;
      return el;
    }

    document.getElementById("runTests").addEventListener("click", runTests);
    runTests();
  </script>
